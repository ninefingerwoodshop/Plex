<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>New Arrivals - Plex</title>
    <style>
        :root {
            --gold: #e5a00d;
            --gold-glow: rgba(229,160,13,0.25);
            --bg: #141414;
            --card: #1a1a1a;
            --card-hover: #222;
            --border: rgba(255,255,255,0.06);
            --text: #e0e0e0;
            --text-dim: rgba(255,255,255,0.4);
            --blue: #3498db;
            --green: #2ecc71;
            --red: #e74c3c;
            --purple: #9b59b6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* Header */
        header {
            background: rgba(10,10,15,0.9);
            padding: 0 16px;
            padding-top: max(0px, env(safe-area-inset-top));
            padding-left: max(16px, env(safe-area-inset-left));
            padding-right: max(16px, env(safe-area-inset-right));
            height: calc(60px + max(0px, env(safe-area-inset-top)));
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding-bottom: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .header-logo { display: flex; align-items: center; gap: 10px; }
        .logo-mark {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--gold), #d4940c);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            box-shadow: 0 2px 10px var(--gold-glow);
            flex-shrink: 0;
        }
        header h1 { color: #fff; font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
        .menu-btn {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 5px; cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .menu-btn:active { background: rgba(255,255,255,0.14); }
        .menu-btn span {
            display: block; width: 20px; height: 2px;
            background: rgba(255,255,255,0.7);
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .menu-btn.open span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
        .menu-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .menu-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }
        .dropdown-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 90;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .dropdown-overlay.open { pointer-events: auto; opacity: 1; }
        .dropdown-menu {
            position: fixed;
            top: 0; right: 0;
            width: 300px;
            max-width: 85vw;
            height: 100%;
            background: #111118;
            border-left: 1px solid var(--border);
            z-index: 91;
            padding: 0 0 max(20px, env(safe-area-inset-bottom));
            padding-top: max(0px, env(safe-area-inset-top));
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .dropdown-menu.open { transform: translateX(0); }
        .dropdown-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .dropdown-user { font-size: 1rem; color: #fff; font-weight: 700; }
        .dropdown-close {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: rgba(255,255,255,0.6);
            font-size: 1.3rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .dropdown-menu a {
            display: flex; align-items: center; gap: 14px;
            padding: 16px 20px;
            color: rgba(255,255,255,0.65);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
        }
        .dropdown-menu a:active { background: rgba(255,255,255,0.06); }
        .dropdown-menu a.active { color: var(--gold); background: rgba(229,160,13,0.07); }
        .dropdown-menu a .menu-icon { font-size: 1.25rem; width: 28px; text-align: center; flex-shrink: 0; }
        .dropdown-menu .menu-divider { height: 1px; background: var(--border); margin: 6px 20px; }
        .dropdown-menu .logout-link { color: var(--red); margin-top: auto; }

        .page-content { max-width: 1400px; margin: 0 auto; padding: 20px 16px 100px; }

        .page-header { margin-bottom: 24px; animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .page-header h2 { color: #fff; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
        .page-header p { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            animation: fadeUp 0.5s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            flex: 1;
            min-width: 120px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }
        .stat-value.gold { color: var(--gold); }
        .stat-value.blue { color: var(--blue); }
        .stat-value.green { color: var(--green); }
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-top: 4px;
        }

        /* Period selector */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            animation: fadeUp 0.5s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .filter-btn {
            padding: 7px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-dim);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.25s;
            font-weight: 500;
        }
        .filter-btn.active {
            background: var(--gold);
            color: var(--bg);
            border-color: var(--gold);
            font-weight: 600;
            box-shadow: 0 2px 12px var(--gold-glow);
        }
        .filter-btn:active:not(.active) { background: rgba(255,255,255,0.05); }
        .filter-divider { width: 1px; height: 20px; background: #333; margin: 0 4px; }

        /* Genre pills */
        .genre-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            animation: fadeUp 0.5s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .genre-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            background: rgba(229,160,13,0.12);
            color: var(--gold);
            border: 1px solid rgba(229,160,13,0.2);
        }
        .genre-count {
            display: inline-block;
            margin-left: 4px;
            padding: 1px 6px;
            border-radius: 8px;
            background: rgba(229,160,13,0.2);
            font-size: 0.6rem;
        }

        /* Section */
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px; margin-top: 8px;
        }
        .section-title {
            font-size: 1.1rem; font-weight: 700; color: #fff;
            display: flex; align-items: center; gap: 8px;
        }
        .section-count {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(229,160,13,0.12);
            color: var(--gold);
        }

        /* Movie grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
            margin-bottom: 36px;
        }

        .poster-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            background: var(--card);
            border: 1px solid var(--border);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
            animation: cardReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .poster-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }
        .poster-placeholder {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #1a1a1a, #222);
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.15); font-size: 0.7rem; padding: 8px;
            text-align: center;
        }
        .card-bottom { padding: 8px 10px 10px; }
        .card-bottom-title {
            font-size: 0.78rem; font-weight: 600; color: #fff;
            line-height: 1.25;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .card-bottom-meta {
            font-size: 0.65rem; color: var(--text-dim);
            margin-top: 3px; display: flex; align-items: center; gap: 6px;
        }
        .added-badge {
            position: absolute; top: 8px; left: 8px;
            padding: 3px 8px; border-radius: 6px;
            font-size: 0.55rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px; z-index: 5;
            background: rgba(46,204,113,0.85); color: #fff;
            backdrop-filter: blur(8px);
        }
        .rating-badge {
            position: absolute; top: 8px; right: 8px;
            padding: 3px 8px; border-radius: 6px;
            font-size: 0.6rem; font-weight: 700; z-index: 5;
            background: rgba(0,0,0,0.7); color: var(--gold);
            backdrop-filter: blur(8px);
        }
        .res-badge {
            padding: 2px 6px; border-radius: 4px;
            font-size: 0.55rem; font-weight: 600;
            background: rgba(52,152,219,0.15); color: var(--blue);
        }

        /* TV Show rows */
        .show-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 8px;
            transition: border-color 0.2s;
            animation: cardReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .show-row:hover { border-color: rgba(255,255,255,0.12); }
        .show-poster {
            width: 50px; height: 75px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .show-poster-placeholder {
            width: 50px; height: 75px;
            border-radius: 6px;
            background: linear-gradient(135deg, #1a1a1a, #222);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.5rem; color: rgba(255,255,255,0.15);
        }
        .show-info { flex: 1; min-width: 0; }
        .show-title { font-size: 0.9rem; font-weight: 700; color: #fff; }
        .show-episodes {
            font-size: 0.75rem; color: var(--text-dim); margin-top: 3px;
        }
        .show-date {
            font-size: 0.7rem; color: var(--text-dim);
            text-align: right; flex-shrink: 0;
        }
        .ep-count-badge {
            display: inline-block;
            padding: 2px 8px; border-radius: 10px;
            font-size: 0.65rem; font-weight: 600;
            background: rgba(46,204,113,0.12); color: var(--green);
            margin-left: 6px;
        }

        /* Loading */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
        }
        .skeleton-card { border-radius: 10px; overflow: hidden; background: var(--card); }
        .skeleton-poster {
            aspect-ratio: 2/3;
            background: linear-gradient(110deg, var(--card) 30%, #222 50%, var(--card) 70%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        .skeleton-text { padding: 10px; }
        .skeleton-line {
            height: 10px; border-radius: 5px;
            background: linear-gradient(110deg, rgba(255,255,255,0.04) 30%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 70%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            margin-bottom: 6px;
        }
        .skeleton-line:last-child { width: 60%; margin-bottom: 0; }
        @keyframes shimmer { to { background-position: -200% 0; } }

        .status-msg {
            text-align: center; color: var(--text-dim);
            padding: 50px 0; font-size: 0.9rem;
        }

        /* Toast */
        .toast-container {
            position: fixed; bottom: 16px; left: 16px; right: 16px;
            z-index: 200; display: flex; flex-direction: column; gap: 8px;
            pointer-events: none; align-items: center;
        }
        .toast {
            padding: 12px 20px; border-radius: 10px;
            font-size: 0.8rem; font-weight: 600;
            pointer-events: auto;
            animation: toastIn 0.4s cubic-bezier(0.16,1,0.3,1);
            backdrop-filter: blur(20px);
        }
        .toast-success { background: rgba(46,204,113,0.9); color: #fff; }
        .toast-error { background: rgba(231,76,60,0.9); color: #fff; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 600px) {
            .stats-bar { gap: 8px; }
            .stat-card { min-width: 80px; padding: 10px 14px; }
            .stat-value { font-size: 1.4rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
            .show-row { padding: 10px 12px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-logo">
            <div class="logo-mark">&#9654;</div>
            <h1>Plex Search</h1>
        </div>
        <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </header>

    <div class="dropdown-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <div class="dropdown-menu" id="menuPanel">
        <div class="dropdown-header">
            <span class="dropdown-user">{{ username|capitalize }}</span>
            <div class="dropdown-close" onclick="toggleMenu()">&times;</div>
        </div>
        <a href="/"><span class="menu-icon">&#128269;</span> Search</a>
        <a href="/downloads"><span class="menu-icon">&#11015;</span> My Downloads</a>
        <a href="/watchlist"><span class="menu-icon">&#128278;</span> Watchlist</a>
        <a href="/dashboard"><span class="menu-icon">&#128202;</span> Dashboard</a>
        <a href="/recommendations"><span class="menu-icon">&#11088;</span> For You</a>
        <a href="/ondeck"><span class="menu-icon">&#9654;</span> On Deck</a>
        <a href="/analytics"><span class="menu-icon">&#128200;</span> Analytics</a>
        <a href="/arrivals" class="active"><span class="menu-icon">&#127381;</span> New Arrivals</a>
        <a href="/seasonal"><span class="menu-icon">&#127809;</span> Seasonal</a>
        <a href="/filter"><span class="menu-icon">&#128683;</span> Filter</a>
        <div class="menu-divider"></div>
        <a href="/logout" class="logout-link"><span class="menu-icon">&#10140;</span> Sign Out</a>
    </div>

    <div class="page-content">
        <div class="page-header">
            <h2>New Arrivals</h2>
            <p id="pageSubtitle">Loading...</p>
        </div>

        <!-- Stats -->
        <div class="stats-bar" id="statsBar" style="display:none;">
            <div class="stat-card">
                <div class="stat-value gold" id="statMovies">0</div>
                <div class="stat-label">New Movies</div>
            </div>
            <div class="stat-card">
                <div class="stat-value blue" id="statShows">0</div>
                <div class="stat-label">Shows Updated</div>
            </div>
            <div class="stat-card">
                <div class="stat-value green" id="statEpisodes">0</div>
                <div class="stat-label">New Episodes</div>
            </div>
        </div>

        <!-- Period filter -->
        <div class="filter-bar">
            <button class="filter-btn" data-days="3" onclick="changePeriod(3)">3 Days</button>
            <button class="filter-btn active" data-days="7" onclick="changePeriod(7)">This Week</button>
            <button class="filter-btn" data-days="14" onclick="changePeriod(14)">2 Weeks</button>
            <button class="filter-btn" data-days="30" onclick="changePeriod(30)">This Month</button>
        </div>

        <!-- Genre breakdown -->
        <div class="genre-bar" id="genreBar"></div>

        <!-- Movies Section -->
        <div id="moviesSection"></div>

        <!-- TV Section -->
        <div id="showsSection"></div>

        <!-- Loading -->
        <div id="loading">
            <div class="skeleton-grid">
                <div class="skeleton-card"><div class="skeleton-poster"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-poster"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-poster"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-poster"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-poster"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-poster"></div><div class="skeleton-text"><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toasts"></div>

    <script>
    function toggleMenu() {
        document.getElementById('menuBtn').classList.toggle('open');
        document.getElementById('menuOverlay').classList.toggle('open');
        document.getElementById('menuPanel').classList.toggle('open');
    }

    let currentDays = 7;

    function toast(msg, type='success') {
        const c = document.getElementById('toasts');
        const t = document.createElement('div');
        t.className = 'toast toast-' + type;
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(10px)'; setTimeout(() => t.remove(), 300); }, 3000);
    }

    function changePeriod(days) {
        currentDays = days;
        document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.toggle('active', parseInt(b.dataset.days) === days);
        });
        document.getElementById('loading').style.display = 'block';
        document.getElementById('moviesSection').innerHTML = '';
        document.getElementById('showsSection').innerHTML = '';
        loadDigest(days);
    }

    async function loadDigest(days) {
        days = days || 7;
        try {
            const r = await fetch(`/api/arrivals/digest?days=${days}`);
            const data = await r.json();
            if (data.error) throw new Error(data.error);

            document.getElementById('loading').style.display = 'none';

            // Stats
            const stats = data.stats;
            document.getElementById('statsBar').style.display = 'flex';
            document.getElementById('statMovies').textContent = stats.new_movies;
            document.getElementById('statShows').textContent = stats.new_shows;
            document.getElementById('statEpisodes').textContent = stats.new_episodes;

            // Subtitle
            document.getElementById('pageSubtitle').textContent =
                `${data.period_start} - ${data.period_end}`;

            // Genre pills
            const genreBar = document.getElementById('genreBar');
            genreBar.innerHTML = '';
            stats.top_genres.forEach(g => {
                genreBar.innerHTML += `<span class="genre-pill">${g.genre}<span class="genre-count">${g.count}</span></span>`;
            });

            // Movies
            const moviesSection = document.getElementById('moviesSection');
            if (data.movies.length > 0) {
                let html = `<div class="section-header">
                    <div class="section-title">New Movies <span class="section-count">${data.movies.length}</span></div>
                </div><div class="grid">`;

                data.movies.forEach((m, i) => {
                    const genres = (m.genres || []).slice(0, 2).join(', ');
                    const res = m.media && m.media.resolution ? m.media.resolution.toUpperCase() : '';
                    const ratingBadge = m.rating ? `<div class="rating-badge">${m.rating.toFixed(1)}</div>` : '';

                    html += `<div class="poster-card" style="animation-delay:${i*0.03}s">
                        <div class="added-badge">${m.addedDate}</div>
                        ${ratingBadge}
                        ${m.poster ? `<img src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.outerHTML='<div class=poster-placeholder>${m.title}</div>'">` : `<div class="poster-placeholder">${m.title}</div>`}
                        <div class="card-bottom">
                            <div class="card-bottom-title">${m.title}</div>
                            <div class="card-bottom-meta">
                                <span>${m.year}</span>
                                <span>${genres}</span>
                                ${m.duration ? `<span>${m.duration}m</span>` : ''}
                                ${res ? `<span class="res-badge">${res}</span>` : ''}
                            </div>
                        </div>
                    </div>`;
                });

                html += '</div>';
                moviesSection.innerHTML = html;
            } else {
                moviesSection.innerHTML = '';
            }

            // TV Shows
            const showsSection = document.getElementById('showsSection');
            if (data.shows.length > 0) {
                let html = `<div class="section-header">
                    <div class="section-title">New TV Episodes <span class="section-count">${stats.new_episodes} episodes</span></div>
                </div>`;

                data.shows.forEach((s, i) => {
                    html += `<div class="show-row" style="animation-delay:${i*0.05}s">
                        ${s.poster ? `<img class="show-poster" src="${s.poster}" alt="${s.show}" loading="lazy" onerror="this.outerHTML='<div class=show-poster-placeholder>TV</div>'">` : '<div class="show-poster-placeholder">TV</div>'}
                        <div class="show-info">
                            <div class="show-title">${s.show}</div>
                            <div class="show-episodes">
                                ${s.episode_summary}
                                <span class="ep-count-badge">${s.episode_count} ep${s.episode_count !== 1 ? 's' : ''}</span>
                            </div>
                        </div>
                        <div class="show-date">${s.addedDate}</div>
                    </div>`;
                });

                showsSection.innerHTML = html;
            } else {
                showsSection.innerHTML = '';
            }

            // No content at all
            if (data.movies.length === 0 && data.shows.length === 0) {
                moviesSection.innerHTML = `<div class="status-msg">No new arrivals in the last ${days} days</div>`;
            }

        } catch (e) {
            document.getElementById('loading').innerHTML = `<div class="status-msg">Error loading digest: ${e.message}</div>`;
        }
    }

    loadDigest(7);
    </script>
</body>
</html>
